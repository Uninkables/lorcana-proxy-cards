<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Lorcana Proxy Card Generator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>Lorcana Proxy Card Generator</h1>
  
<h2>Search Cards to Add</h2>

<div class="search-controls">
  <input type="text" id="cardSearch" placeholder="Search for card..." />
</div>

<div id="searchResults"></div>

<h2>Selected Cards</h2>
<button class="btnPrimary" id="printSheetBtn">Generate Sheet</button>
<button onclick="previewPrintSheet()">Preview Sheet (Debug)</button>
<div id="selectedCards"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="card-renderer.js"></script>
  
<script>

async function ensureFontsLoaded() {

  await document.fonts.ready;
  
  await document.fonts.load('700 16px "Brandon Grotesque"');
  await document.fonts.load('900 16px "Brandon Grotesque"');
  await document.fonts.load('500 italic 16px "Brandon Grotesque"');
  
  await document.fonts.load("10px Brandon Grotesque");
  await document.fonts.load("10px Brandon Grotesque Condensed");
  await document.fonts.load("10px 'The Bystander Collection'");

  await document.fonts.load("10px 'Avenir Next Cyr'");
}

async function forceSVGFontLoad(svg) {

  const texts = svg.querySelectorAll("text");

  for (const el of texts) {

    const font = window.getComputedStyle(el).font;

    try {
      await document.fonts.load(font);
    } catch (e) {
      console.warn("Font load failed:", font);
    }

  }

}

async function embedFonts(svg) {

  const style = document.createElementNS("http://www.w3.org/2000/svg", "style");

  style.textContent = `
  @font-face {
    font-family: 'The Bystander Collection';
    src: url('./fonts/BystanderSans-Bold.ttf') format('truetype');
    font-style: bold;
  }
  
  @font-face {
    font-family: 'Brandon Grotesque';
    src: url('./fonts/brandon-grotesque-bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
  }
  
  @font-face {
    font-family: 'Brandon Grotesque';
    src: url('./fonts/brandon-grotesque-black.otf') format('opentype');
    font-weight: 900;
    font-style: normal;
  }
  
  @font-face {
    font-family: 'Brandon Grotesque';
    src: url('./fonts/brandon-grotesque-medium-italic.otf') format('opentype');
    font-weight: 500;
    font-style: italic;
  }
  
  @font-face {
    font-family: 'Brandon Grotesque Condensed';
    src: url('./fonts/HvDTrial_BrandonGrotesqueCond-Bold.otf') format('opentype');
    font-weight: normal;
  }
  
  @font-face {
    font-family: 'Brandon Grotesque Condensed';
    src: url('./fonts/HvDTrial_BrandonGrotesqueCond-BoldItalic.otf') format('opentype');
    font-weight: bold;
    font-style: italic;
  }
  
  @font-face {
    font-family: 'Avenir Next Cyr';
    src: url('./fonts/AvenirNextCyr-Bold.ttf') format('truetype');
    font-weight: bold;
  }
  
  @font-face {
    font-family: 'Avenir Next Cyr';
    src: url('./fonts/AvenirNextCyr-BoldItalic.ttf') format('truetype');
    font-weight: bold;
    font-style: italic;
  }

  #name {
    font-family: 'The Bystander Collection';
  }
  
  #version {
    font-family: 'Brandon Grotesque Condensed';
  }
  
  #ink-color-test {
    font-family: 'Avenir Next Cyr';
    font-style: italic;
  }
  
  #classifications {
    font-family: 'Brandon Grotesque Condensed';
    font-style: italic;
  }
  
  #artist {
    font-family: 'Avenir Next Cyr';
  }
  
  #card-and-set-text {
    font-family: 'Avenir Next Cyr';
    color: #737373;
  }
  
  #card-text {
    font-family: 'Brandon Grotesque Condensed';
  }
  `;

  svg.insertBefore(style, svg.firstChild);
}

function inlinePageCSS(svg) {

  let css = "";

  for (const sheet of document.styleSheets) {

    try {
      const rules = sheet.cssRules;

      for (const rule of rules) {

        if (
          rule.type === CSSRule.FONT_FACE_RULE ||
          rule.type === CSSRule.STYLE_RULE
        ) {
          css += rule.cssText + "\n";
        }

      }

    } catch (e) {
      // Ignore cross-origin stylesheets
      continue;
    }

  }

  const style = document.createElementNS(
    "http://www.w3.org/2000/svg",
    "style"
  );

  style.textContent = css;

  svg.insertBefore(style, svg.firstChild);
}
  
let cards = [];
const selected = new Map();

fetch("cards.json")
  .then(r => r.json())
  .then(data => {
    cards = data;
  });

const searchInput = document.getElementById("cardSearch");
const resultsDiv = document.getElementById("searchResults");
const selectedDiv = document.getElementById("selectedCards");

searchInput.addEventListener("input", () => {
  const query = searchInput.value.toLowerCase();
  resultsDiv.innerHTML = "";

  if (!query) return;

  cards
    .filter(c => {
      const matchesSearch =
        `${c.name} - ${c.version}`.toLowerCase().includes(query);
    
      if (!matchesSearch) return false;
    
      // ---- Filter rarity ----
      const blockedRarities = ["Epic", "Enchanted"];
      if (blockedRarities.includes(c.rarity)) return false;
    
      // ---- Filter Locations ----
      if (Array.isArray(c.type) && c.type.includes("Location")) {
        return false;
      }
    
      return true;
    })
    .slice(0, 20)
    .forEach(card => {
      const div = document.createElement("div");
      div.className = "search-result";
    
      const img = document.createElement("img");
      img.src = card.image_uris.digital.small;
      img.alt = `${card.name} - ${card.version}`;
      img.className = "search-thumb";
    
      const info = document.createElement("div");
      info.className = "card-info";
    
      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = `${card.name} - ${card.version}`;
    
      const sub = document.createElement("div");
      sub.className = "card-sub";
      sub.textContent = `${card.collector_number}/204 EN·${card.set.code}`;
    
      info.append(title, sub);
      const thumbWrapper = document.createElement("div");
      thumbWrapper.className = "thumb-wrapper";
      thumbWrapper.appendChild(img);
      
      div.append(thumbWrapper, info);
    
      div.onclick = () => addCard(card);
    
      resultsDiv.appendChild(div);
    });
});

function addCard(card) {
  const key = card.id;

  if (selected.has(key)) {
    selected.get(key).quantity += 1;
  } else {
    selected.set(key, { card, quantity: 1 });
  }

  renderSelected();
  resultsDiv.innerHTML = "";
  searchInput.value = "";
}

function renderSelected() {
  selectedDiv.innerHTML = "";

  for (const [key, data] of selected.entries()) {
    const { card, quantity } = data;

    const row = document.createElement("div");
    row.className = "selected-card";

    // Thumbnail
    const thumbWrapper = document.createElement("div");
    thumbWrapper.className = "thumb-wrapper";

    const img = document.createElement("img");
    img.src = card.image_uris.digital.small;
    img.className = "search-thumb";

    thumbWrapper.appendChild(img);

    // Info
    const info = document.createElement("div");
    info.className = "card-info";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = `${card.name} - ${card.version}`;

    const sub = document.createElement("div");
    sub.className = "card-sub";
    sub.textContent = `${card.collector_number}/204 EN·${card.set.code}`;

    info.append(title, sub);

    // Quantity controls
    const qtyWrapper = document.createElement("div");
    qtyWrapper.className = "qty-wrapper";

    const minus = document.createElement("button");
    minus.textContent = "−";
    minus.className = "circle-btn";
    minus.onclick = () => updateQty(key, quantity - 1);

    const input = document.createElement("input");
    input.type = "number";
    input.min = "0";
    input.value = quantity;
    input.className = "qty-input";
    input.onchange = () =>
      updateQty(key, parseInt(input.value || 0, 10));

    const plus = document.createElement("button");
    plus.textContent = "+";
    plus.className = "circle-btn";
    plus.onclick = () => updateQty(key, quantity + 1);

    qtyWrapper.append(minus, input, plus);

    row.append(thumbWrapper, info, qtyWrapper);
    selectedDiv.appendChild(row);
  }
}

function updateQty(key, newQty) {
  if (newQty <= 0) {
    selected.delete(key);
  } else {
    selected.get(key).quantity = newQty;
  }

  renderSelected();
}

document.getElementById("printSheetBtn")
  .addEventListener("click", generatePrintSheet);

async function renderCardToImage(card, container) {

    // Clear previous content
    container.innerHTML = "";

    // Load the SVG card
    await loadCard(card, container);

    const svg = container.querySelector("svg");

    if (!svg) {
        console.error("SVG not found after loadCard()");
        return null;
    }

    // Allow the browser to finish SVG layout
    await new Promise(requestAnimationFrame);
    await new Promise(requestAnimationFrame);

    // Serialize the SVG
    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svg);

    const svgBlob = new Blob(
        [svgString],
        { type: "image/svg+xml;charset=utf-8" }
    );

    const url = URL.createObjectURL(svgBlob);

    // Load SVG into an image
    const img = new Image();

    await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
    });

    URL.revokeObjectURL(url);

    // Create canvas
    const scale = 4;

    const canvas = document.createElement("canvas");

    canvas.width = svg.width.baseVal.value * scale;
    canvas.height = svg.height.baseVal.value * scale;

    const ctx = canvas.getContext("2d");

    ctx.scale(scale, scale);

    ctx.drawImage(img, 0, 0);

    return canvas;
}

async function previewPrintSheet() {

  await ensureFontsLoaded();
  await document.fonts.ready;

  const expandedCards = [];

  for (const { card, quantity } of selected.values()) {
    for (let i = 0; i < quantity; i++) {
      expandedCards.push(card);
    }
  }

  if (expandedCards.length === 0) {
    alert("No cards selected.");
    return;
  }

  const previewWindow = window.open("", "_blank");

  previewWindow.document.write(`
    <html>
    <head>
      <title>Card Sheet Preview</title>
      <style>
        body {
          margin:0;
          background:#ccc;
          display:flex;
          justify-content:center;
        }

        .page {
          width:8.5in;
          height:11in;
          background:white;
          position:relative;
          box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        .card {
          position:absolute;
        }

        .gridline {
          position:absolute;
          background:black;
        }
      </style>
    </head>
    <body>
      <div class="page" id="page"></div>
    </body>
    </html>
  `);

  previewWindow.document.close();

  const page = previewWindow.document.getElementById("page");

  const cardHeight = 3.45;
  const cardWidth = cardHeight * (2.5/3.5);

  const cols = 3;
  const rows = 3;

  const totalGridWidth = cardWidth * cols;
  const totalGridHeight = cardHeight * rows;

  const startX = (8.5 - totalGridWidth) / 2;
  const startY = (11 - totalGridHeight) / 2;

  let cardIndex = 0;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {

      if (cardIndex >= expandedCards.length) break;

      const card = expandedCards[cardIndex];

      const x = startX + col * cardWidth;
      const y = startY + row * cardHeight;

      const container = previewWindow.document.createElement("div");

      container.className = "card";
      container.style.left = x + "in";
      container.style.top = y + "in";
      container.style.width = cardWidth + "in";
      container.style.height = cardHeight + "in";

      page.appendChild(container);

      await loadCard(card, container);

      cardIndex++;

    }
  }
}

async function generatePrintSheet() {

  await ensureFontsLoaded();
  await document.fonts.ready;

  const { jsPDF } = window.jspdf;

  const expandedCards = [];

  for (const { card, quantity } of selected.values()) {
    for (let i = 0; i < quantity; i++) {
      expandedCards.push(card);
    }
  }

  if (expandedCards.length === 0) {
    alert("No cards selected.");
    return;
  }

  const doc = new jsPDF({
    orientation: "portrait",
    unit: "in",
    format: "letter"
  });

  const pageWidth = 8.5;
  const pageHeight = 11;

  const cardHeight = 3.45;
  const cardWidth = cardHeight * (2.5 / 3.5);

  const cols = 3;
  const rows = 3;
  const cardsPerPage = cols * rows;

  const totalGridWidth = cardWidth * cols;
  const totalGridHeight = cardHeight * rows;

  const startX = (pageWidth - totalGridWidth) / 2;
  const startY = (pageHeight - totalGridHeight) / 2;

  let cardIndex = 0;
  const totalPages = Math.ceil(expandedCards.length / cardsPerPage);

  for (let page = 0; page < totalPages; page++) {

    if (page > 0) doc.addPage();

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {

        if (cardIndex >= expandedCards.length) break;

        const card = expandedCards[cardIndex];

        const x = startX + col * cardWidth;
        const y = startY + row * cardHeight;

        try {

          const imgData = await renderCardToImage(card);

          doc.addImage(
            imgData,
            "JPEG",
            x,
            y,
            cardWidth,
            cardHeight
          );

        } catch (err) {
          console.error("Card render failed:", err);
        }

        cardIndex++;
      }
    }

    doc.setLineWidth(0.01);

    for (let c = 0; c <= cols; c++) {
      const x = startX + c * cardWidth;
      doc.line(x, 0, x, pageHeight);
    }

    for (let r = 0; r <= rows; r++) {
      const y = startY + r * cardHeight;
      doc.line(0, y, pageWidth, y);
    }
  }

  doc.save("card-sheet.pdf");
}

async function loadImageAsDataURL(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      // Force conversion to JPEG
      const jpegData = canvas.toDataURL("image/jpeg", 0.95);
      resolve(jpegData);
    };

    img.onerror = reject;
    img.src = url;
  });
}
  
</script>  
</body>
</html>
